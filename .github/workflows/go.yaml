name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tidy:
    name: go mod tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code

  test:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.18.x"
          - "1.19.x"
          - "1.20.x"
          - "1.21.x"
          - "1.22.x"
          - "1.23.x"
          - "1.24.x"
          - "1.25.x"
          - "stable"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Show Go version
        run: go version

      - name: Test
        run: go test ./...
name: Go Compatibility

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go 1.22.x
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false

      - name: Show Go version
        run: go version

      - name: Test
        run: go test ./...
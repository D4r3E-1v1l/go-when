name: Go Compatibility

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.18.x"
          - "1.19.x"
          - "1.20.x"
          - "1.21.x"
          - "1.22.x"
          - "1.23.x"
          - "1.24.x"
          - "1.25.x"
          - "stable"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - run: go version
      - run: go test ./...